services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: appflame-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - appflame
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: appflame-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - appflame
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: appflame-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: appflame
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: appflame
      MYSQL_PASSWORD: secret
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appflame
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  appflame:
    driver: bridge

volumes:
  mysql_data:
    driver: local
